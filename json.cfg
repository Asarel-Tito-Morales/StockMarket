{
  "OUTPUT_DIR": "./output",
  "NEWS_OUTPUT_FILE": "raw_news.csv",
  "STOCK_OUTPUT_FILE": "raw_stock.csv",
  "MERGED_OUTPUT_FILE": "merged_sentiment_stock.csv",
  "MODEL_OUTPUT_FILE": "price_impact_model.keras",
  "SCALER_OUTPUT_FILE": "feature_scaler.joblib",
  "METRICS_OUTPUT_FILE": "model_metrics.json",
  "PREDICTIONS_OUTPUT_FILE": "predictions.csv",
  "LOG_FILE": "agent.log",

  "TICKERS": ["AAPL", "MSFT"],
  "NEWS_API_KEY": "REPLACE_ME",
  "NEWS_SOURCE": "newsapi",
  "NEWS_URL": "",
  "NEWS_QUERY_LANGUAGE": "en",
  "NEWS_LOOKBACK_HOURS": 48,
  "NEWS_PAGE_SIZE": 50,

  "START_DATE": "2026-01-01",
  "END_DATE": "",
  "STOCK_INTERVAL": "30m",
  "STOCK_PERIOD": "1mo",
  "RESAMPLE_INTERVAL_MINUTES": 30,

  "RUN_EVERY_MINUTES": 5,
  "CONTINUOUS_RUN": true,
  "TIMEZONE": "America/New_York",

  "SENTIMENT_MODEL": "vader",
  "SENTIMENT_POSITIVE_THRESHOLD": 0.05,
  "SENTIMENT_NEGATIVE_THRESHOLD": -0.05,

  "PREDICTION_TARGET": "direction",
  "LOOKAHEAD_PERIODS": 2,
  "TARGET_FLAT_THRESHOLD": 0.0025,

  "MODEL_RETRAIN_EVERY_HOURS": 12,
  "TRAIN_TEST_SPLIT": 0.2,
  "RANDOM_SEED": 42,
  "EPOCHS": 20,
  "BATCH_SIZE": 32,
  "EARLY_STOPPING_PATIENCE": 5,

  "HISTORICAL_CANDLE_MONTHS": 3,
  "ENABLE_PLOTTING": true,
  "ENABLE_CANDLESTICK": true,
  "ENABLE_TRAINING": true,
  "ENABLE_PREDICTION": true,

  "MATCHING_RULE": "floor",
  "SAVE_PLOTS_AS_HTML": true
}
